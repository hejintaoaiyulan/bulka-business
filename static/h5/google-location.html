<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>选择位置</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }

    #map {
      height: calc(100% - 60px);
    }

    .center-marker {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 30px;
      height: 30px;
      margin-left: -15px;
      margin-top: -30px;
      z-index: 9;
      pointer-events: none;
    }

    .footer {
      min-height: 60px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 15px;
      box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1);
    }

    .btn {
      background-color: #07c160;
      color: white;
      padding: 8px 16px;
      border-radius: 5px;
      font-size: 16px;
      border: none;
      white-space: nowrap;
    }

    .address {
      display: flex;
      flex-direction: column;
      row-gap: 2px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <img class="center-marker" src="https://maps.gstatic.com/mapfiles/api-3/images/spotlight-poi2_hdpi.png" />
  <div class="footer">
    <div class="address">
      <div id="coord-display">纬度: ---, 经度: ---</div>
      <div id="address-display" style="font-size: 14px;">地址: 加载中...</div>
    </div>
    <button class="btn" onclick="confirmLocation()">确定</button>
  </div>

  <script type="text/javascript" src="https://doc.dcloud.net.cn/uni.webview.1.5.6.js"></script>
  <script>
    let map;
    let currentCenter = { lat: 0, lng: 0 };
    let geocoder;
    let currentAddress = "";
    let addressName = '';

    function getQueryParam(key) {
      const url = new URL(window.location.href)
      return parseFloat(url.searchParams.get(key))
    }

    function initMap() {
      const lat = getQueryParam('lat') || 39.9042; // 默认北京
      const lng = getQueryParam('lng') || 116.4074;
      currentCenter = { lat, lng };
      // 创建地图
      const create = () => {
        geocoder = new google.maps.Geocoder();
        map = new google.maps.Map(document.getElementById("map"), {
          center: currentCenter,
          zoom: 16,
          disableDefaultUI: true
        });

        updateCoordDisplay(currentCenter);
        reverseGeocode(currentCenter);

        map.addListener("idle", () => {
          currentCenter = map.getCenter().toJSON();
          updateCoordDisplay(currentCenter);
          reverseGeocode(currentCenter);
        });
      }
      if(currentCenter.lat && currentCenter.lng) {
        create()
      }else {
        navigator.geolocation.getCurrentPosition((position) => {
          currentCenter = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };

          create()

        }, () => {
          alert("无法获取定位");
        });
      }
    }

    function updateCoordDisplay({ lat, lng }) {
      document.getElementById("coord-display").textContent =
        `纬度: ${lat.toFixed(6)}, 经度: ${lng.toFixed(6)}`;
    }

    function reverseGeocode(latlng) {
      geocoder.geocode({ location: latlng }, (results, status) => {
        if (status === "OK" && results[0]) {
          currentAddress = results[0].formatted_address;
          addressName = results[0].address_components[0].short_name
          document.getElementById("address-display").textContent =
            "地址: " + currentAddress;
        } else {
          currentAddress = "";
          addressName = '';
          document.getElementById("address-display").textContent =
            "地址: 无法识别";
        }
      });
    }

    function confirmLocation() {
      const payload = {
        lat: currentCenter.lat,
        lng: currentCenter.lng,
        address: currentAddress,
        name: addressName
      };

      if (window.uni) {
        uni.postMessage({ data: payload });
      } else {
        window.top.postMessage({ data: payload }, '*');
        window.postMessage(payload, '*')
      }
    }
  </script>

  <!-- ✅ 替换你的 Google API Key -->
  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC2dpdvm87rWSY3pocUfpxpkTawMHebSjw&callback=initMap">
  </script>
</body>
</html>
